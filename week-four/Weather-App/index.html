<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background overlay for dark sky effect -->
    <div class="background"></div>

    <main class="app">
        <!-- Search Bar -->
        <div class="search-wrapper">
            <form id="search-form" class="search-bar">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="city-input" placeholder="Search city..." autocomplete="off" required>
                <button type="submit" class="sr-only">Search</button>
            </form>
            <!-- Autocomplete dropdown — sits below the search bar -->
            <ul id="suggestions-list" class="suggestions-list"></ul>
        </div>

        <!-- Location Button -->
        <button id="location-btn" class="location-btn" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            Use My Location
        </button>

        <!-- Weather Results -->
        <section id="weather-results">
            <!-- Main Weather Card -->
            <div class="glass-card main-card">
                <p class="city-name" id="city-name">--</p>
                <p class="weather-condition" id="weather-condition">--</p>

                <div class="weather-icon-container">
                    <img class="weather-icon" id="weather-icon" src="" alt="weather icon">
                </div>

                <p class="temperature" id="temperature">--°</p>
            </div>

            <!-- Stats Row -->
            <div class="stats-row">
                <div class="glass-card stat-card">
                    <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                    <p class="stat-value" id="humidity">--%</p>
                    <p class="stat-label">Humidity</p>
                </div>
                <div class="glass-card stat-card">
                    <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
                    </svg>
                    <p class="stat-value" id="wind">-- km/h</p>
                    <p class="stat-label">Wind</p>
                </div>
                <div class="glass-card stat-card">
                    <svg class="stat-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"></path>
                        <polyline points="13 11 9 17 15 17 11 23"></polyline>
                    </svg>
                    <p class="stat-value" id="precipitation">--%</p>
                    <p class="stat-label">Precipitation</p>
                </div>
            </div>

            <!-- Hourly Forecast -->
            <div class="glass-card forecast-card">
                <h3 class="forecast-title">Hourly Forecast</h3>
                <div class="forecast-scroll" id="forecast-scroll">
                    <!-- Forecast items will be inserted here -->
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
